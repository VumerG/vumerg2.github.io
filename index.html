<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sira - Recetario Agroindustrial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Sira: Control de Procesamiento</h1>
            <p>Registro de Valor Agregado por Productor</p>
        </header>

        <form id="registroForm">
            <fieldset>
                <legend>1. Datos del Producto (Materia Prima)</legend>
                <div class="form-group">
                    <label>Nombre del Producto (Ej. Carambola, Mango, Chorizo)</label>
                    <input type="text" id="producto" placeholder="¿Qué estás procesando?" required>
                </div>
                <div class="form-group">
                    <label>URL de la Foto del Producto (Materia Prima o Lote)</label>
                    <input type="url" id="imgProducto" placeholder="Enlace de la imagen">
                </div>
                <div class="grid-form">
                    <div class="form-group">
                        <label>Temporada / Disponibilidad</label>
                        <input type="text" id="temporada" placeholder="Ej. Abril - Junio">
                    </div>
                    <div class="form-group">
                        <label>Región de Producción</label>
                        <input type="text" id="region" placeholder="Ej. Sur de México">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>2. Elaboración y Proceso Técnico</legend>
                <div class="form-group">
                    <label>Nombre de la Receta / Derivado</label>
                    <input type="text" id="nombreReceta" placeholder="Ej. Mermelada artesanal con bajo azúcar">
                </div>
                <div class="form-group">
                    <label>URL de Foto del Proceso o Producto Final</label>
                    <input type="url" id="imgProceso" placeholder="Enlace de la foto del resultado">
                </div>
                <div class="form-group">
                    <label>Instrucciones Paso a Paso (Manual Técnico)</label>
                    <textarea id="instrucciones" rows="6" placeholder="1. Recepción y limpieza...&#10;2. Escaldado a 85°C por 5 min...&#10;3. Concentración hasta punto de mermelada...&#10;&#10;*Indica señales de error (ej. 'si cambia a color café, retirar').*"></textarea>
                </div>
                <div class="form-group">
                    <label>Utensilios y Equipo Especializado</label>
                    <input type="text" id="equipo" placeholder="Ej. Refractómetro, deshidratador solar, pH-metro">
                </div>
            </fieldset>

            <fieldset>
                <legend>3. Control de Calidad y Salida (Variables Y)</legend>
                <div class="grid-form">
                    <div class="form-group">
                        <label>Contenido de Azúcar (°Brix)</label>
                        <input type="number" id="brix" step="0.1" placeholder="Ej. 65">
                    </div>
                    <div class="form-group">
                        <label>Nivel de Acidez (pH)</label>
                        <input type="number" id="ph" step="0.01" placeholder="Ej. 3.4">
                    </div>
                    <div class="form-group">
                        <label>Rendimiento Final (kg/L)</label>
                        <input type="number" id="rendimiento" step="0.01" placeholder="Ej. 0.850">
                    </div>
                    <div class="form-group">
                        <label>Costo de Producción ($)</label>
                        <input type="number" id="costo" step="0.01" placeholder="0.00">
                    </div>
                </div>
            </fieldset>

            <button type="submit" id="btnGuardar">Registrar Proceso en Firebase</button>
        </form>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
